{% extends 'base.html' %}
{% block title %}Seasonal Sale | {{ store_name }}{% endblock %}
{% block content %}
<div style="max-width:600px; margin:0 auto;">
    <a href="{{ url_for('dashboard') }}" class="back-link">&larr; Back to Dashboard</a>
    <h1 style="color:#2e7d6e; margin-bottom:1.5rem;">🔥 Seasonal Sale</h1>

    {% if sale_state.active %}
    <div style="background:#fef3c7; border:1px solid #f59e0b; border-radius:8px; padding:1rem 1.5rem; margin-bottom:1.5rem;">
        <strong>Sale Active:</strong> {{ sale_state.discount_percent }}% off {{ sale_state.category }}
    </div>
    <form method="POST">
        <input type="hidden" name="action" value="deactivate">
        <button type="submit" class="btn btn-danger">Stop Sale</button>
    </form>
    {% else %}
    <div style="background:white; border-radius:10px; padding:2rem; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
        <form method="POST">
            <input type="hidden" name="action" value="activate">
            <div class="form-group">
                <label>Category</label>
                <select name="category">
                    {% for cat in categories %}
                    <option>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Discount %</label>
                <input type="number" name="discount_percent" value="10" min="1" max="90">
            </div>
            <button type="submit" class="btn btn-primary">Activate Sale</button>
        </form>
    </div>
    {% endif %}
</div>
{% endblock %}
