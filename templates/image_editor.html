{% extends 'base.html' %}

{% block title %}Edit Images | {{ product.Title }}{% endblock %}

{% block content %}
<div class="image-editor">
    <a href="{{ url_for('view_product', sku=product.SKU) }}" class="back-link">&larr; Back to Product</a>
    
    <h1>Edit Images: {{ product.Title }}</h1>
    
    <div class="editor-container">
        <div class="canvas-wrapper">
            <canvas id="editor-canvas"></canvas>
        </div>
        
        <div class="editor-controls">
            <button onclick="rotate()">Rotate</button>
            <button onclick="zoomIn()">Zoom In</button>
            <button onclick="zoomOut()">Zoom Out</button>
            <button onclick="reset()">Reset</button>
            <button onclick="saveImage()" class="btn-primary">Save</button>
        </div>
        
        <div class="image-thumbnails">
            {% if product.valid_images %}
                {% for img in product.valid_images %}
                    <img src="{{ url_for('serve_upload', filename=img) }}" 
                         class="thumb" 
                         data-filename="{{ img }}"
                         onclick="loadImage(this.src)">
                {% endfor %}
            {% endif %}
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('editor-canvas');
const ctx = canvas.getContext('2d');
let currentImage = null;
let scale = 1;
let rotation = 0;

function loadImage(src) {
    const img = new Image();
    img.onload = () => {
        currentImage = img;
        scale = 1;
        rotation = 0;
        draw();
    };
    img.src = src;
}

function draw() {
    if (!currentImage) return;
    
    canvas.width = currentImage.width * scale;
    canvas.height = currentImage.height * scale;
    
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(rotation * Math.PI / 180);
    ctx.drawImage(currentImage, -currentImage.width/2, -currentImage.height/2, 
                  currentImage.width * scale, currentImage.height * scale);
    ctx.restore();
}

function rotate() {
    rotation += 90;
    draw();
}

function zoomIn() {
    scale *= 1.2;
    draw();
}

function zoomOut() {
    scale /= 1.2;
    draw();
}

function reset() {
    scale = 1;
    rotation = 0;
    draw();
}

function saveImage() {
    if (!currentImage) return;
    
    const dataURL = canvas.toDataURL('image/png');
    fetch('/save-image/{{ product.SKU }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({image_data: dataURL})
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert('Image saved!');
            location.reload();
        } else {
            alert('Error: ' + data.error);
        }
    });
}
</script>
{% endblock %}
